# ETNA workload index for num-bigint.
#
# One [[variant]] per injected mutation. Source of truth for variant->property
# mapping. Every other fact is derivable from the source tree:
#   - ls patches/*.patch                   (patch-based variants)
#   - grep -rn "pub fn property_" src/     (property functions)
#   - grep -rn "fn witness_.*_case_" tests/ src/  (witness tests)
#
# Base commit for this workload is the HEAD of the bootstrap ancestor of all
# etna/<variant> branches. Recover with: `git merge-base --octopus etna/*`.

